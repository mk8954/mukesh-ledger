<style>

.header{

</style>
</head>

<body>

<!-- HOME -->
<div id="home">
<div class="header">
<div>Total Balance</div>
<div class="balance" id="totalMain">₹0</div>
</div>

<div class="container">

<div class="card">
<div class="accounts">
<div class="acc">Bank<br><b id="bankBal">₹0</b></div>
<div class="acc">Wallet<br><b id="walletBal">₹0</b></div>
<div class="acc">Credit<br><b id="creditBal">₹0</b></div>
</div>
</div>

<div class="card">
<div class="quick">
<div class="qbtn"><button onclick="openForm('expense')">-</button>Expense</div>
<div class="qbtn"><button onclick="openForm('income')">+</button>Income</div>
<div class="qbtn"><button onclick="openForm('loan')">₹</button>Credit</div>
<div class="qbtn"><button onclick="openForm('loan_return')">↩️</button>Return</div>
<div class="qbtn"><button onclick="quickTransfer()">⇄</button>Transfer</div>
</div>
</div>

<div class="card">
<h4>Recent</h4>
<div id="entries"></div>
</div>

</div>
</div>

<!-- FORM -->
<div id="formScreen" class="hidden container">
<h3 id="formTitle"></h3>
<input id="amount" placeholder="Amount">
<input id="category" placeholder="Category">
<select id="source">
<option value="bank">Bank</option>
<option value="wallet">Wallet</option>
<option value="credit">Credit</option>
</select>
<button class="main" onclick="saveEntry()">Save</button>
<button class="main" onclick="back()" style="background:#999;margin-top:10px">Cancel</button>
</div>

<!-- STATEMENT -->
<div id="statement" class="hidden container">
<h3>Statement</h3>
<input type="month" id="stmtMonth">
<button class="main" onclick="generateStatement()">Generate</button>
<button class="main" onclick="downloadPDF()" style="margin-top:10px">Download PDF</button>
<div id="stmtResult"></div>
</div>

<!-- MANAGE -->
<div id="manage" class="hidden container">

<div class="card">
<h4>Set Balance</h4>
<input id="mbank" placeholder="Bank">
<input id="mwallet" placeholder="Wallet">
<input id="mcredit" placeholder="Credit">
<button class="main" onclick="updateBalance()">Save</button>
</div>

<div class="card">
<h4>Transfer</h4>
<select id="fromAcc"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select>
<select id="toAcc"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select>
<input id="transferAmt" placeholder="Amount">
<button class="main" onclick="transferMoney()">Transfer</button>
</div>

<div class="card">
<h4>Adjust Balance</h4>
<select id="adjAccount"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select>
<select id="adjType"><option value="add">Add</option><option value="subtract">Subtract</option></select>
<input id="adjAmount" placeholder="Amount">
<input id="adjNote" placeholder="Reason">
<button class="main" onclick="adjustBalance()">Apply</button>
</div>

</div>

<!-- BACKUP -->
<div id="backup" class="hidden container">
<button class="main" onclick="backupData()">Download Backup</button>
<button class="main" onclick="restoreData()">Restore Backup</button>
<input type="file" id="restoreFile" hidden>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="showTab('home')">🏠<br>Home</div>
<div onclick="showTab('statement')">📄<br>Stmt</div>
<div onclick="showTab('manage')">⚙️<br>Manage</div>
<div onclick="showTab('backup')">💾<br>Backup</div>
<div onclick="showTab('formScreen')">➕<br>Add</div>
</div>

function openForm(t){currentType=t;formTitle.innerText=t;showTab('formScreen')}
function back(){showTab('home')}
function save(){localStorage.setItem('ledger',JSON.stringify(data));localStorage.setItem('balances',JSON.stringify(balances))}

function saveEntry(){
 let amt=+amount.value,cat=category.value,src=source.value;
 if(!amt||!cat) return alert('Enter details');
 data.unshift({type:currentType,amount:amt,category:cat,source:src,date:new Date().toISOString()});
 if(currentType==='expense'||currentType==='loan') balances[src]-=amt;
 else balances[src]+=amt;
 save();render();back();
}

function updateBalance(){balances.bank=+mbank.value||0;balances.wallet=+mwallet.value||0;balances.credit=+mcredit.value||0;save();render()}

function transferMoney(){
 let f=fromAcc.value,t=toAcc.value,a=+transferAmt.value;
 if(f===t||!a)return alert('Invalid');
 balances[f]-=a;balances[t]+=a;
 data.unshift({type:'transfer',amount:a,category:Transfer ${f}->${t},source:f,date:new Date().toISOString()});
 save();render();
}

function adjustBalance(){
 let acc=adjAccount.value,type=adjType.value,amt=+adjAmount.value;
 if(type==='add') balances[acc]+=amt; else balances[acc]-=amt;
 data.unshift({type:'adjustment',amount:amt,category:adjNote.value||'Adjust',source:acc,date:new Date().toISOString()});
 save();render();
}

function backupData(){
 let blob=new Blob([JSON.stringify({ledger:data,balances})]);
 let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup.json';a.click();
}

function restoreData(){restoreFile.click()}
restoreFile.onchange=e=>{
 let r=new FileReader();
 r.onload=()=>{let o=JSON.parse(r.result);data=o.ledger;balances=o.balances;save();render();}
 r.readAsText(e.target.files[0]);
}

function render(){
 totalMain.innerText='₹'+(balances.bank+balances.wallet);
 bankBal.innerText='₹'+balances.bank;
 walletBal.innerText='₹'+balances.wallet;
 creditBal.innerText='₹'+balances.credit;
 entries.innerHTML=data.slice(0,6).map(e=><div class="entry"><div>${e.category}</div><div>₹${e.amount}</div></div>).join('');
}

function generateStatement(){
 let m=stmtMonth.value;
 stmtResult.innerHTML=data.filter(e=>e.date.startsWith(m))
 .map(e=><div class="entry">${e.category} ₹${e.amount}</div>).join('');
}

 const { jsPDF } = window.jspdf;

 doc.setFontSize(14);

 doc.setFontSize(10);

 let balance=0;
 let m=stmtMonth.value;

 data.filter(e=>e.date.startsWith(m)).forEach(e=>{
  let debit='',credit='';

    credit=e.amount; balance+=e.amount;
  } else {
    debit=e.amount; balance-=e.amount;
  }

  doc.text(e.date.substring(0,10),10,y);
  doc.text(e.category.substring(0,15),40,y);
  doc.text(debit?debit.toString():'-',120,y);

  doc.text(balance.toString(),180,y);
  y+=6;

  if(y>280){doc.addPage();y=20;}
 });

 doc.save("statement.pdf");
}

render();
