<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expense Tracker Pro</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expense Pro">
<meta name="theme-color" content="#065f46">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

<style>
:root { --primary: #065f46; --secondary: #1e3a8a; --bg: #fcfcfc; --text: #1e293b; --muted: #64748b; --red: #ef4444; --green: #22c55e; }
* { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

/* HEADER & LOGO */
.header { padding: 18px 15px; background: white; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; }
.header img { height: 35px; width: 35px; border-radius: 8px; object-fit: contain; }
.header-text b { color: var(--primary); font-size: 16px; display: block; line-height: 1; }
.header-text small { color: var(--muted); font-size: 9px; }

/* DASHBOARD CARD */
.balance-card { margin: 15px; padding: 25px; background: linear-gradient(135deg, #1e3a8a, #6d28d9); border-radius: 20px; color: white; position: relative; overflow: hidden; }
.balance-card img.card-bg-icon { position: absolute; right: -10px; bottom: -10px; width: 100px; opacity: 0.2; transform: rotate(-15deg); }
.sub-row { background: white; margin: -30px 25px 0; padding: 15px; border-radius: 15px; display: flex; box-shadow: 0 8px 20px rgba(0,0,0,0.05); position: relative; z-index: 10; text-align: center; }
.sub-row > div { flex: 1; border-right: 1px solid #f1f5f9; }
.sub-row > div:last-child { border-right: none; }
.sub-row span { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }

/* NAV */
.nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -4px 15px rgba(0,0,0,0.04); border-radius: 20px 20px 0 0; z-index: 1000; }
.nav-item { text-align: center; font-size: 10px; color: #94a3b8; flex: 1; cursor: pointer; }
.nav-item.active { color: var(--primary); font-weight: 700; }
.nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }

/* MODAL / FORMS */
.hidden { display: none !important; }
.card { background: white; margin: 15px; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
.btn-main { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--primary); color: white; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }
.input-block { margin-bottom: 18px; }
.input-label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.full-input { width: 100%; padding: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; }
.amt-row { display: flex; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 15px; }
.amt-symbol { font-weight: 800; font-size: 18px; margin-right: 10px; }
.amt-field { border: none; background: transparent; padding: 14px 0; font-size: 18px; font-weight: 700; width: 100%; outline: none; }

/* SEGMENTED CONTROL */
.segmented { display: flex; background: #e2e8f0; margin: 15px; padding: 4px; border-radius: 12px; position: relative; }
.seg-btn { flex: 1; z-index: 2; padding: 10px 0; text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); border: none; background: transparent; cursor: pointer; }
.seg-btn.active { color: var(--text); }
.seg-slider { position: absolute; width: calc(25% - 4px); height: calc(100% - 8px); background: white; border-radius: 9px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }

/* TABLE */
.table-wrapper { overflow-x: auto; margin: 15px; border-radius: 15px; border: 1px solid #eee; background: white; }
table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 580px; }
th { background: var(--primary); color: white; padding: 12px 10px; text-align: left; }
td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2953/2953536.png'">
    <div class="header-text"><b>Expense Tracker</b><small>empowering every penny.</small></div>
</div>

<div id="scr-home">
    <div class="balance-card">
        <span style="font-size:13px; opacity:0.8">Total Balance</span>
        <h2 id="hTotal" style="margin:8px 0 0; font-size:28px">₹ 0.00</h2>
        <img src="card-icon.png" class="card-bg-icon" onerror="this.style.display='none'">
    </div>
    <div class="sub-row">
        <div><span>Bank</span><b id="hBank" style="color:var(--green)">₹ 0</b></div>
        <div><span>Wallet</span><b id="hWallet" style="color:var(--secondary)">₹ 0</b></div>
        <div><span>Credit</span><b id="hCredit" style="color:var(--red)">₹ 0</b></div>
    </div>
    <div style="padding:25px 15px 10px; font-weight:800; font-size:16px;">Quick Actions</div>
    <div style="display:flex; justify-content:space-around; padding:10px;">
        <div onclick="openForm('expense')" style="text-align:center"><div style="background:var(--red); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:24px; margin:0 auto 5px; box-shadow:0 4px 10px rgba(239,68,68,0.2)">−</div><small>Expense</small></div>
        <div onclick="openForm('income')" style="text-align:center"><div style="background:var(--green); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:24px; margin:0 auto 5px; box-shadow:0 4px 10px rgba(34,197,94,0.2)">+</div><small>Income</small></div>
        <div onclick="showTab('scr-credit')" style="text-align:center"><div style="background:var(--secondary); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; margin:0 auto 5px; box-shadow:0 4px 10px rgba(30,58,138,0.2)">₹</div><small>Credit</small></div>
        <div onclick="openForm('transfer')" style="text-align:center"><div style="background:#8b5cf6; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:20px; margin:0 auto 5px; box-shadow:0 4px 10px rgba(139,92,246,0.2)">⇄</div><small>Transfer</small></div>
    </div>
</div>

<div id="scr-credit" class="hidden">
    <div class="segmented">
        <div id="seg-slide" class="seg-slider" style="transform:translateX(0)"></div>
        <button class="seg-btn active" onclick="moveSeg(0,'issued')">Issued</button>
        <button class="seg-btn" onclick="moveSeg(1,'taken')">Taken</button>
        <button class="seg-btn" onclick="moveSeg(2,'return')">Return</button>
        <button class="seg-btn" onclick="moveSeg(3,'payback')">Payback</button>
    </div>
    <div class="card">
        <h3 id="cTitle" style="margin-top:0">Issue Credit</h3>
        <div class="input-block"><label class="input-label">Date</label><input type="date" id="cDate" class="full-input" value="2026-05-01"></div>
        <div class="input-block"><label class="input-label">Name</label><input type="text" id="cName" class="full-input" placeholder="Person Name"></div>
        <div class="input-block"><label class="input-label">Amount</label><div class="amt-row"><span id="cSym" class="amt-symbol" style="color:var(--red)">₹</span><input type="number" id="cAmt" class="amt-field" placeholder="0.00"></div></div>
        <div class="input-block"><label class="input-label">Account</label><select id="cSrc" class="full-input"><option value="bank">Bank</option><option value="wallet">Wallet</option></select></div>
        <button class="btn-main" onclick="saveCredit()">Save Credit Entry</button>
    </div>
</div>

<div id="scr-form" class="hidden">
    <div class="card">
        <h3 id="fTitle" style="margin-top:0">Entry</h3>
        <div id="transfer-box" class="hidden">
            <div class="input-block"><label class="input-label">From</label><select id="fFrom" class="full-input"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select></div>
            <div class="input-block"><label class="input-label">To</label><select id="fTo" class="full-input"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select></div>
        </div>
        <div class="input-block"><label class="input-label">Date</label><input type="date" id="fDate" class="full-input" value="2026-05-01"></div>
        <div class="input-block"><label class="input-label">Amount</label><div class="amt-row"><span id="fSym" class="amt-symbol">₹</span><input type="number" id="fAmt" class="amt-field" placeholder="0.00"></div></div>
        <div id="fMeta"><div class="input-block"><label class="input-label">Particulars</label><input type="text" id="fDesc" class="full-input" placeholder="Details"></div><div class="input-block"><label class="input-label">Account</label><select id="fSrc" class="full-input"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select></div></div>
        <button class="btn-main" onclick="saveEntry()">Save Record</button>
        <button class="btn-main" style="background:#f1f5f9; color:var(--muted); margin-top:10px;" onclick="showTab('scr-home')">Cancel</button>
    </div>
</div>

<div id="scr-manage" class="hidden">
    <div class="card" style="border:2px solid var(--secondary)">
        <h3 style="margin-top:0">Initial Setup</h3>
        <div class="input-block"><label class="input-label">Bank</label><input type="number" id="iBank" class="full-input"></div>
        <div class="input-block"><label class="input-label">Wallet</label><input type="number" id="iWallet" class="full-input"></div>
        <div class="input-block"><label class="input-label">Credit</label><input type="number" id="iCredit" class="full-input"></div>
        <button class="btn-main" style="background:var(--secondary)" onclick="initData()">Set Initial Balances</button>
    </div>
    <div class="card">
        <h3>Manual Adjustment</h3>
        <div class="input-block"><label class="input-label">Select Account</label><select id="aAcc" class="full-input"><option value="bank">Bank</option><option value="wallet">Wallet</option><option value="credit">Credit</option></select></div>
        <div class="input-block"><label class="input-label">Adjustment (±)</label><input type="number" id="aAmt" class="full-input" placeholder="e.g. -20"></div>
        <div class="input-block"><label class="input-label">Reason</label><input type="text" id="aReason" class="full-input" placeholder="Why adjusting?"></div>
        <button class="btn-main" style="background:#8b5cf6" onclick="doAdjust()">Apply Adjustment</button>
    </div>
</div>

<div id="scr-stmt" class="hidden">
    <div style="padding:15px; display:flex; gap:10px;"><input type="month" id="stmtMonth" value="2026-05" class="full-input"><button class="btn-main" onclick="renderStmt()" style="margin:0; flex:1">Render</button></div>
    <div style="padding:0 15px"><button class="btn-main" style="background:var(--red)" onclick="exportPDF()">📄 Download PDF</button></div>
    <div class="table-wrapper">
        <table id="mainTable">
            <thead><tr><th>Date</th><th>Particulars</th><th>Type</th><th>Debit</th><th>Credit</th><th>Balance</th></tr></thead>
            <tbody id="stmtBody"></tbody>
        </table>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" id="n-home" onclick="showTab('scr-home')"><span class="nav-icon">🏠</span>Home</div>
    <div class="nav-item" id="n-stmt" onclick="showTab('scr-stmt')"><span class="nav-icon">📊</span>Stmt</div>
    <div class="nav-item" id="n-credit" onclick="showTab('scr-credit')"><span class="nav-icon">💸</span>Credit</div>
    <div class="nav-item" id="n-manage" onclick="showTab('scr-manage')"><span class="nav-icon">⚙️</span>Set</div>
</div>

<script>
let ledger = JSON.parse(localStorage.getItem('ledger') || '[]');
let bal = JSON.parse(localStorage.getItem('bal') || '{"bank":0,"wallet":0,"credit":0}');
let fMode = 'expense', cMode = 'issued';

function showTab(id){
    ['scr-home','scr-stmt','scr-credit','scr-manage','scr-form'].forEach(s=>document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    let nid = 'n-'+id.split('-')[1]; if(document.getElementById(nid)) document.getElementById(nid).classList.add('active');
}

function openForm(m){
    fMode = m; document.getElementById('fTitle').innerText = m.toUpperCase();
    document.getElementById('transfer-box').classList.toggle('hidden', m !== 'transfer');
    document.getElementById('fMeta').classList.toggle('hidden', m === 'transfer');
    document.getElementById('fSym').style.color = (m==='income') ? 'var(--green)' : 'var(--red)';
    showTab('scr-form');
}

function moveSeg(i, t){
    cMode = t; document.getElementById('seg-slide').style.transform = `translateX(${i * 100}%)`;
    document.querySelectorAll('.seg-btn').forEach((b,idx)=>b.classList.toggle('active', idx===i));
    const m = {issued:'Issue Credit', taken:'Take Loan', return:'Receive Back', payback:'Pay Back'};
    document.getElementById('cTitle').innerText = m[t];
    document.getElementById('cSym').style.color = (t==='taken'||t==='return') ? 'var(--green)' : 'var(--red)';
}

function saveCredit(){
    let a = +document.getElementById('cAmt').value, n = document.getElementById('cName').value, s = document.getElementById('cSrc').value, dt = document.getElementById('cDate').value;
    if(!a || !n) return alert("Fill all fields");
    ledger.unshift({type:cMode, amount:a, desc:n, src:s, date:dt});
    if(cMode==='taken'||cMode==='return') bal[s]+=a; else bal[s]-=a;
    save(); showTab('scr-home');
}

function saveEntry(){
    let a = +document.getElementById('fAmt').value, dt = document.getElementById('fDate').value;
    if(fMode==='transfer'){
        let f = document.getElementById('fFrom').value, t = document.getElementById('fTo').value;
        bal[f]-=a; bal[t]+=a; ledger.unshift({type:'transfer', amount:a, desc:`Transfer: ${f} to ${t}`, src:f, date:dt});
    } else {
        let d = document.getElementById('fDesc').value, s = document.getElementById('fSrc').value;
        ledger.unshift({type:fMode, amount:a, desc:d, src:s, date:dt});
        if(fMode==='income') bal[s]+=a; else bal[s]-=a;
    }
    save(); showTab('scr-home');
}

function doAdjust(){
    let a = +document.getElementById('aAmt').value, r = document.getElementById('aReason').value, s = document.getElementById('aAcc').value;
    bal[s]+=a; ledger.unshift({type:'adjustment', amount:Math.abs(a), desc:'ADJ: '+r, src:s, date:new Date().toISOString().split('T')[0]});
    save(); showTab('scr-home');
}

function initData(){
    bal.bank = +document.getElementById('iBank').value; bal.wallet = +document.getElementById('iWallet').value; bal.credit = +document.getElementById('iCredit').value;
    save(); alert("Done!"); showTab('scr-home');
}

function save(){ localStorage.setItem('ledger', JSON.stringify(ledger)); localStorage.setItem('bal', JSON.stringify(bal)); render(); }

function render(){
    document.getElementById('hTotal').innerText = '₹ '+(bal.bank+bal.wallet).toLocaleString('en-IN',{minimumFractionDigits:2});
    document.getElementById('hBank').innerText = '₹ '+bal.bank.toLocaleString();
    document.getElementById('hWallet').innerText = '₹ '+bal.wallet.toLocaleString();
    document.getElementById('hCredit').innerText = '₹ '+bal.credit.toLocaleString();
}

function fmt(iso){
    const d = new Date(iso), m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${String(d.getDate()).padStart(2,'0')} ${m[d.getMonth()]} ${d.getFullYear()}`;
}

function renderStmt(){
    const sel = document.getElementById('stmtMonth').value; let running = 0, html = "";
    ledger.filter(e=>e.date.startsWith(sel)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
        let isIn = ['income','taken','return'].includes(e.type);
        if(e.type==='adjustment' && ledger.find(x=>x===e).amount > 0) isIn = true;
        running = isIn ? running + e.amount : running - e.amount;
        html += `<tr><td>${fmt(e.date)}</td><td>${e.desc}</td><td>${e.type.toUpperCase()}</td><td style="color:var(--red)">${isIn?'-':e.amount.toFixed(2)}</td><td style="color:var(--green)">${isIn?e.amount.toFixed(2):'-'}</td><td>${running.toFixed(2)}</td></tr>`;
    });
    document.getElementById('stmtBody').innerHTML = html;
}

function exportPDF(){
    const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("Statement", 14, 15);
    doc.autoTable({ html: '#mainTable', startY: 20, theme: 'grid', headStyles:{fillColor:[6,95,70]} });
    doc.save("Statement.pdf");
}

render();

// SERVICE WORKER REGISTRATION FOR INSTALLATION
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}
</script>
</body>
</html>
