<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mukesh Personal Ledger</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;
  padding:20px
}
.container{
  max-width:760px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.12)
}
input,select,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #dbeafe;
  border-radius:14px;
  box-sizing:border-box
}
button{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:#fff;
  border:none;
  font-weight:bold
}
.nav{display:flex;gap:10px}
.nav button{flex:1;width:auto}
.entry{
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:12px;
  margin:10px 0;
  background:#f9fafb
}
.small{font-size:14px;color:#555}
</style>
</head>

<body>

<!-- PIN SCREEN -->
<div id="pinScreen" class="container" style="display:none">
<h2>Mukesh Personal Ledger</h2>
<p class="small">Enter your 4-digit PIN</p>
<input type="password" id="pinInput" maxlength="4" placeholder="PIN">
<button onclick="unlockApp()">Unlock</button>
<button onclick="setPin()">Set / Change PIN</button>
</div>

<!-- APP SCREEN -->
<div class="container" id="appScreen">

<h2>Mukesh Personal Ledger</h2>

<div class="nav">
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('monthly')">Monthly</button>
<button onclick="generateStatement()">PDF</button>
</div>

<button id="installBtn" onclick="installApp()" style="display:none">
Install App
</button>

<input type="date" id="date">

<select id="type" onchange="toggleFields()">
<option value="expense">Daily Expense</option>
<option value="income">Income</option>
<option value="loan">Money Given</option>
<option value="loan_return">Money Returned</option>
<option value="transfer">Transfer</option>
</select>

<select id="source">
<option value="bank">Bank</option>
<option value="wallet">Wallet</option>
<option value="credit_card">Credit Card</option>
</select>

<div id="targetWrap" style="display:none">
<select id="target">
<option value="">Transfer To</option>
<option value="bank">Bank</option>
<option value="wallet">Wallet</option>
<option value="credit_card">Credit Card</option>
</select>
</div>

<div id="categoryWrap">
<input type="text" id="category" placeholder="Category / Person">
</div>

<div id="daysWrap" style="display:none">
<input type="number" id="days" placeholder="Reminder days">
</div>

<input type="number" id="amount" placeholder="Amount">
<input type="text" id="note" placeholder="Note">

<button onclick="addEntry()">Add Entry</button>

<h3>Opening Balances</h3>
<input type="number" id="bankOpening" placeholder="Bank">
<input type="number" id="walletOpening" placeholder="Wallet">
<input type="number" id="cardOpening" placeholder="Credit Card">
<button onclick="saveBalances()">Save Balances</button>

<!-- DASHBOARD -->
<div id="dashboardTab">
<h3>Summary</h3>
<div id="totals" class="small"></div>

<h3>Monthly Snapshot</h3>
<div id="dashboardSummary" class="small"></div>

<h3>Accounts</h3>
<div id="accounts" class="small"></div>

<h3>Backup</h3>
<div id="backupStatus" class="small"></div>

<button onclick="restoreLatestBackup()">Restore Backup</button>

<h3>Pending Credit</h3>
<div id="creditList" class="small"></div>

<div id="entries"></div>
</div>

<!-- MONTHLY -->
<div id="monthlyTab" style="display:none">
<input id="searchBox" placeholder="Search">
<h3>Monthly</h3>
<div id="monthlyHistory" class="small"></div>

<h3>Category Summary</h3>
<div id="categorySummary" class="small"></div>

<h3>Overdue</h3>
<div id="overdueList" class="small"></div>
</div>

</div>

<script>
let deferredPrompt=null;

let entries=JSON.parse(localStorage.getItem('finance_entries')||'[]');
let appPin=localStorage.getItem('ledger_pin')||'';
let lastBackup=localStorage.getItem('ledger_last_backup')||'';
let balances=JSON.parse(localStorage.getItem('finance_balances')||'{"bank":0,"wallet":0,"credit_card":0}');

let renderTimer;

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

window.addEventListener('beforeinstallprompt',(e)=>{
 e.preventDefault();
 deferredPrompt=e;
 document.getElementById('installBtn').style.display='block';
});

function installApp(){
 if(!deferredPrompt) return alert('Not available');
 deferredPrompt.prompt();
 deferredPrompt=null;
}

function setPin(){
 const p=prompt('Enter 4-digit PIN');
 if(!/^\d{4}$/.test(p||'')) return alert('Invalid PIN');
 localStorage.setItem('ledger_pin',p);
 appPin=p;
 autoBackup();
}

function autoBackup(){
 const today=new Date().toISOString().slice(0,10);
 localStorage.setItem('ledger_auto_backup',JSON.stringify({entries,balances,pin:appPin,date:today}));
 localStorage.setItem('ledger_last_backup',today);
 lastBackup=today;
}

function restoreLatestBackup(){
 const raw=localStorage.getItem('ledger_auto_backup');
 if(!raw) return alert('No backup');
 if(!confirm('Restore?')) return;
 const d=JSON.parse(raw);
 entries=d.entries||[];
 balances=d.balances||balances;
 appPin=d.pin||appPin;
 save();
}

function unlockApp(){
 if(document.getElementById('pinInput').value!==appPin)
 return alert('Wrong PIN');

 document.getElementById('pinScreen').style.display='none';
 document.getElementById('appScreen').style.display='block';
}

function toggleFields(){
 const t=document.getElementById('type').value;
 document.getElementById('targetWrap').style.display=t==='transfer'?'block':'none';
 document.getElementById('categoryWrap').style.display=t==='transfer'?'none':'block';
 document.getElementById('daysWrap').style.display=t==='loan'?'block':'none';
}

function showTab(tab){
 document.getElementById('dashboardTab').style.display=tab==='dashboard'?'block':'none';
 document.getElementById('monthlyTab').style.display=tab==='monthly'?'block':'none';
}

function save(){
 localStorage.setItem('finance_entries',JSON.stringify(entries));
 autoBackup();

 clearTimeout(renderTimer);
 renderTimer=setTimeout(render,100);
}

function saveBalances(){
 balances={
  bank:+document.getElementById('bankOpening').value||0,
  wallet:+document.getElementById('walletOpening').value||0,
  credit_card:+document.getElementById('cardOpening').value||0
 };
 localStorage.setItem('finance_balances',JSON.stringify(balances));
 autoBackup();
 render();
}

function addEntry(){
 const e={
  date:date.value,
  type:type.value,
  source:source.value,
  target:target.value,
  category:category.value.trim(),
  amount:+amount.value,
  note:note.value.trim(),
  days:+days.value||0
 };

 if(!e.date||!e.amount) return alert('Invalid data');

 entries.unshift(e);
 save();

 category.value=amount.value=note.value=days.value=target.value='';
}

function removeEntry(i){
 entries.splice(i,1);
 save();
}

function render(){
 document.getElementById('bankOpening').value=balances.bank;
 document.getElementById('walletOpening').value=balances.wallet;
 document.getElementById('cardOpening').value=balances.credit_card;

 let html='';
 let income=0,expense=0,loan=0,returned=0;

 entries.forEach((e,i)=>{
  if(e.type==='income') income+=e.amount;
  if(e.type==='expense') expense+=e.amount;
  if(e.type==='loan') loan+=e.amount;
  if(e.type==='loan_return') returned+=e.amount;

  html+=`
  <div class='entry'>
  <b>${e.category||e.type}</b> ₹${e.amount}
  <br><span class='small'>${e.date} | ${e.type}</span>
  <button onclick="removeEntry(${i})">Delete</button>
  </div>`;
 });

 entriesDiv.innerHTML=html;

 totals.innerHTML=Income ₹${income}<br>Expense ₹${expense};
}

if(appPin){
 document.getElementById('pinScreen').style.display='block';
 document.getElementById('appScreen').style.display='none';
}else{
 document.getElementById('appScreen').style.display='block';
}

toggleFields();
render();
</script>

</body>
</html>
